# .pre-commit-config.yaml
# Pre-commit hooks for pulso. Auto-formats and lints code on every commit.
# Setup: pip install pre-commit && pre-commit install
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
