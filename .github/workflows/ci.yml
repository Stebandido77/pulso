name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install ruff
        run: pip install "ruff>=0.4"
      - name: Ruff check
        run: ruff check pulso tests scripts
      - name: Ruff format check
        run: ruff format --check pulso tests scripts

  typecheck:
    name: Type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package
        run: pip install -e ".[dev]"
      - name: Mypy
        run: mypy pulso
        continue-on-error: true  # type-check is advisory in Phase 0

  test:
    name: Test (Python ${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Install package
        run: pip install -e ".[dev]"
      - name: Run tests
        run: pytest -v --cov=pulso --cov-report=xml
      - name: Upload coverage
        if: matrix.python == '3.11'
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
        continue-on-error: true

  validate-data:
    name: Validate JSON data files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: pip install -e ".[dev]"
      - name: Validate sources.json, epochs.json, variable_map.json
        run: pytest tests/unit/test_schemas.py -v

  protected-paths:
    name: Enforce branch path conventions
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check branch path constraints
        run: |
          BRANCH="${{ github.head_ref }}"
          BASE="${{ github.base_ref }}"
          git fetch origin "$BASE"

          CHANGED=$(git diff --name-only "origin/$BASE...HEAD")
          echo "Changed files:"
          echo "$CHANGED"

          if [[ "$BRANCH" == feat/code-* ]]; then
            if echo "$CHANGED" | grep -qE '^pulso/data/(sources|variable_map)\.json$'; then
              echo "::error::Branches feat/code-* must NOT modify data JSONs."
              echo "Move data changes to a feat/data-* branch."
              exit 1
            fi
          elif [[ "$BRANCH" == feat/data-* ]]; then
            if echo "$CHANGED" | grep -qE '^pulso/_(core|config|utils)/'; then
              echo "::error::Branches feat/data-* must NOT modify core code."
              echo "Move code changes to a feat/code-* branch."
              exit 1
            fi
          fi
